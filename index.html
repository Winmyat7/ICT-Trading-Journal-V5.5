<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐋 ICT Trading Journal - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --color-bg: #0a0e1a;
            --color-bg-secondary: #141821;
            --color-bg-tertiary: #1a1f2e;
            --color-text: #e8eaed;
            --color-text-muted: #9aa0a6;
            --color-accent-blue: #3b82f6;
            --color-accent-green: #10b981;
            --color-accent-red: #ef4444;
            --color-border: #2d3748;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 100%);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-container {
            background: var(--color-bg-secondary);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .auth-header p {
            color: var(--color-text-muted);
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--color-text);
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--color-bg-tertiary);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            color: var(--color-text);
            font-size: 14px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--color-accent-blue);
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--color-accent-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .btn-primary:hover {
            background: #2563eb;
        }
        
        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: var(--color-text-muted);
            font-size: 14px;
        }
        
        .auth-switch a {
            color: var(--color-accent-blue);
            text-decoration: none;
            cursor: pointer;
        }
        
        .auth-switch a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--color-accent-red);
            color: var(--color-accent-red);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }
        
        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--color-accent-green);
            color: var(--color-accent-green);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }
        
        .hidden {
            display: none !important;
        }
        
        .password-strength {
            margin-top: 8px;
            font-size: 12px;
        }
        
        .strength-weak { color: var(--color-accent-red); }
        .strength-medium { color: #f59e0b; }
        .strength-strong { color: var(--color-accent-green); }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Login Form -->
        <div id="loginForm">
            <div class="auth-header">
                <h1>🐋 ICT Trading Journal</h1>
                <p>Login to access your journal</p>
            </div>
            
            <div id="loginError" class="error-message"></div>
            
            <div class="form-group">
                <label>Username or Email</label>
                <input type="text" id="loginUsername" placeholder="Enter username or email">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password">
            </div>
            
            <button class="btn-primary" onclick="login()">🔐 Login</button>
            
            <div class="auth-switch">
                Don't have an account? <a onclick="showSignup()">Sign Up</a>
            </div>
        </div>
        
        <!-- Sign Up Form -->
        <div id="signupForm" class="hidden">
            <div class="auth-header">
                <h1>🐋 Create Account</h1>
                <p>Start your trading journal journey</p>
            </div>
            
            <div id="signupError" class="error-message"></div>
            <div id="signupSuccess" class="success-message"></div>
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="signupUsername" placeholder="Choose a username">
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signupEmail" placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Create a password" oninput="checkPasswordStrength()">
                <div id="passwordStrength" class="password-strength"></div>
            </div>
            
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="signupConfirmPassword" placeholder="Confirm your password">
            </div>
            
            <button class="btn-primary" onclick="signup()">✨ Sign Up</button>
            
            <div class="auth-switch">
                Already have an account? <a onclick="showLogin()">Login</a>
            </div>
        </div>
    </div>
    
    <script>
        // Check if already logged in
        window.onload = function() {
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                // Redirect to journal
                window.location.href = 'index1.html';
            }
        };
        
        // Switch between login and signup
        function showSignup() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signupForm').classList.remove('hidden');
            clearMessages();
        }
        
        function showLogin() {
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            clearMessages();
        }
        
        function clearMessages() {
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('signupError').style.display = 'none';
            document.getElementById('signupSuccess').style.display = 'none';
        }
        
        // Password strength checker
        function checkPasswordStrength() {
            const password = document.getElementById('signupPassword').value;
            const strengthDiv = document.getElementById('passwordStrength');
            
            if (password.length === 0) {
                strengthDiv.textContent = '';
                return;
            }
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]+/)) strength++;
            if (password.match(/[A-Z]+/)) strength++;
            if (password.match(/[0-9]+/)) strength++;
            if (password.match(/[$@#&!]+/)) strength++;
            
            if (strength <= 2) {
                strengthDiv.textContent = '⚠️ Weak password';
                strengthDiv.className = 'password-strength strength-weak';
            } else if (strength <= 4) {
                strengthDiv.textContent = '✓ Medium strength';
                strengthDiv.className = 'password-strength strength-medium';
            } else {
                strengthDiv.textContent = '✓✓ Strong password';
                strengthDiv.className = 'password-strength strength-strong';
            }
        }
        
        // Sign Up Function
        function signup() {
            const username = document.getElementById('signupUsername').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            
            const errorDiv = document.getElementById('signupError');
            const successDiv = document.getElementById('signupSuccess');
            
            // Validation
            if (!username || !email || !password || !confirmPassword) {
                errorDiv.textContent = '❌ All fields are required';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
                return;
            }
            
            if (username.length < 3) {
                errorDiv.textContent = '❌ Username must be at least 3 characters';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
                return;
            }
            
            if (!email.includes('@')) {
                errorDiv.textContent = '❌ Please enter a valid email';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.textContent = '❌ Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
                return;
            }
            
            if (password !== confirmPassword) {
                errorDiv.textContent = '❌ Passwords do not match';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
                return;
            }
            
            // Check if user already exists
            const users = JSON.parse(localStorage.getItem('users') || '{}');
            
            if (users[username]) {
                errorDiv.textContent = '❌ Username already exists';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
                return;
            }
            
            // Check if email already exists
            for (let user in users) {
                if (users[user].email === email) {
                    errorDiv.textContent = '❌ Email already registered';
                    errorDiv.style.display = 'block';
                    successDiv.style.display = 'none';
                    return;
                }
            }
            
            // Create user
            users[username] = {
                email: email,
                password: btoa(password), // Simple base64 encoding (not secure for production!)
                createdAt: new Date().toISOString()
            };
            
            localStorage.setItem('users', JSON.stringify(users));
            
            // Show success
            errorDiv.style.display = 'none';
            successDiv.textContent = '✅ Account created successfully! Please login.';
            successDiv.style.display = 'block';
            
            // Clear form
            document.getElementById('signupUsername').value = '';
            document.getElementById('signupEmail').value = '';
            document.getElementById('signupPassword').value = '';
            document.getElementById('signupConfirmPassword').value = '';
            document.getElementById('passwordStrength').textContent = '';
            
            // Auto switch to login after 2 seconds
            setTimeout(() => {
                showLogin();
            }, 2000);
        }
        
        // Login Function
        function login() {
            const usernameOrEmail = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            const errorDiv = document.getElementById('loginError');
            
            if (!usernameOrEmail || !password) {
                errorDiv.textContent = '❌ Please enter username and password';
                errorDiv.style.display = 'block';
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('users') || '{}');
            
            // Find user by username or email
            let foundUser = null;
            let foundUsername = null;
            
            for (let username in users) {
                if (username === usernameOrEmail || users[username].email === usernameOrEmail) {
                    foundUser = users[username];
                    foundUsername = username;
                    break;
                }
            }
            
            if (!foundUser) {
                errorDiv.textContent = '❌ User not found';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Check password
            if (btoa(password) !== foundUser.password) {
                errorDiv.textContent = '❌ Incorrect password';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Login successful
            localStorage.setItem('currentUser', foundUsername);
            
            // Redirect to journal
            window.location.href = 'index1.html';
        }
        
        // Allow Enter key to submit
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (!document.getElementById('loginForm').classList.contains('hidden')) {
                    login();
                } else if (!document.getElementById('signupForm').classList.contains('hidden')) {
                    signup();
                }
            }
        });
    </script>
</body>
</html>
