<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐋 ICT Trading Journal - Firebase Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --color-bg: #0a0e1a;
            --color-bg-secondary: #141821;
            --color-bg-tertiary: #1a1f2e;
            --color-text: #e8eaed;
            --color-text-muted: #9aa0a6;
            --color-accent-blue: #3b82f6;
            --color-accent-green: #10b981;
            --color-accent-red: #ef4444;
            --color-border: #2d3748;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 100%);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-container {
            background: var(--color-bg-secondary);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .auth-header p {
            color: var(--color-text-muted);
            font-size: 14px;
        }
        
        .firebase-badge {
            display: inline-block;
            background: rgba(255, 165, 0, 0.2);
            color: #FFA500;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 8px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--color-text);
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--color-bg-tertiary);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            color: var(--color-text);
            font-size: 14px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--color-accent-blue);
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--color-accent-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .btn-primary:hover {
            background: #2563eb;
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: var(--color-text-muted);
            font-size: 14px;
        }
        
        .auth-switch a {
            color: var(--color-accent-blue);
            text-decoration: none;
            cursor: pointer;
        }
        
        .auth-switch a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--color-accent-red);
            color: var(--color-accent-red);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }
        
        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--color-accent-green);
            color: var(--color-accent-green);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }
        
        .hidden {
            display: none !important;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: var(--color-text-muted);
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            border: 3px solid var(--color-border);
            border-top: 3px solid var(--color-accent-blue);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: var(--color-text-muted);
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--color-border);
        }

        .divider span {
            padding: 0 10px;
        }

        .google-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: #333;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .google-btn:hover {
            background: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Login Form -->
        <div id="loginForm">
            <div class="auth-header">
                <h1>🐋 ICT Trading Journal</h1>
                <p>Login to access your journal</p>
                <span class="firebase-badge">🔥 Cloud Sync Enabled</span>
            </div>
            
            <div id="loginError" class="error-message"></div>
            <div id="loginLoading" class="loading">
                <div class="spinner"></div>
                <p>Logging in...</p>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password">
            </div>
            
            <button class="btn-primary" onclick="login()">🔐 Login</button>

            <div class="divider"><span>or</span></div>

            <button class="google-btn" onclick="signInWithGoogle()">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Sign in with Google
            </button>
            
            <div class="auth-switch">
                Don't have an account? <a onclick="showSignup()">Sign Up</a>
            </div>
        </div>
        
        <!-- Sign Up Form -->
        <div id="signupForm" class="hidden">
            <div class="auth-header">
                <h1>🐋 Create Account</h1>
                <p>Start your trading journal journey</p>
                <span class="firebase-badge">🔥 Cloud Sync Enabled</span>
            </div>
            
            <div id="signupError" class="error-message"></div>
            <div id="signupSuccess" class="success-message"></div>
            <div id="signupLoading" class="loading">
                <div class="spinner"></div>
                <p>Creating account...</p>
            </div>
            
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="signupName" placeholder="Your name">
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signupEmail" placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Create a password (min 6 characters)">
            </div>
            
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="signupConfirmPassword" placeholder="Confirm your password">
            </div>
            
            <button class="btn-primary" onclick="signup()">✨ Sign Up</button>

            <div class="divider"><span>or</span></div>

            <button class="google-btn" onclick="signInWithGoogle()">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Sign up with Google
            </button>
            
            <div class="auth-switch">
                Already have an account? <a onclick="showLogin()">Login</a>
            </div>
        </div>
    </div>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script>
    // ၂။ သင့်ရဲ့ Config (ဒါကို မပြောင်းပါနဲ့၊ မှန်ပါတယ်)
    const firebaseConfig = {
        apiKey: "AIzaSyBAjw6t6oRJGEdYqHpuqIMDga0RpQJTRGA",
        authDomain: "ict-trading-journal-system.firebaseapp.com",
        projectId: "ict-trading-journal-system",
        storageBucket: "ict-trading-journal-system.firebasestorage.app",
        messagingSenderId: "542689001082",
        appId: "1:542689001082:web:3d0bb80c9a3a06002fc5c3",
        measurementId: "G-DNGJEEZ4FT"
    };

    // ၃။ Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // ၄။ Google Login Function (အသစ်ပြန်ပြင်ထားသည်)
    async function loginWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        const errorDiv = document.getElementById('loginError');
        
        try {
            // Popup ပွင့်လာပါမယ်
            const result = await auth.signInWithPopup(provider);
            console.log("Success:", result.user);
            
            // Login အောင်မြင်ရင် Journal ဆီ သွားမယ်
            window.location.href = 'index1.html'; 
        } catch (error) {
            console.error("Error:", error.code);
            let msg = "❌ Google Login Error: ";
            
            if (error.code === 'auth/popup-blocked') {
                msg += "Browser က Pop-up ကို ပိတ်ထားပါတယ်။ အပေါ်နားမှာ Allow ပေးလိုက်ပါ။";
            } else if (error.code === 'auth/unauthorized-domain') {
                msg += "Firebase မှာ Domain (GitHub link) ထည့်ဖို့ ကျန်နေပါသေးတယ်။";
            } else {
                msg += error.message;
            }
            errorDiv.innerHTML = msg;
            errorDiv.style.display = 'block';
        }
    }

    // ၅။ Email/Password Login
    async function login() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const errorDiv = document.getElementById('loginError');
        try {
            await auth.signInWithEmailAndPassword(email, password);
            window.location.href = 'index1.html';
        } catch (error) {
            errorDiv.textContent = '❌ Email သို့မဟုတ် Password မှားနေပါသည်။';
            errorDiv.style.display = 'block';
        }
    }

    // ၆။ Signup Function
    async function signup() {
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const errorDiv = document.getElementById('signupError');
        try {
            await auth.createUserWithEmailAndPassword(email, password);
            alert('✅ အကောင့်ဖွင့်ပြီးပါပြီ။ Login ပြန်ဝင်ပါ။');
            showLogin();
        } catch (error) {
            errorDiv.textContent = '❌ ' + error.message;
            errorDiv.style.display = 'block';
        }
    }

    function showSignup() {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('signupForm').classList.remove('hidden');
    }
    function showLogin() {
        document.getElementById('signupForm').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
    }
</script>
</body>
</html>
